<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class=""> <div id="errorBanner" class="error-banner">City not found. Please try again!</div>

    <div class="container">
        <h1>Weather Finder</h1>

        <p id="lastSearchedText" style="font-size: 0.8rem; opacity: 0.7; margin-bottom: 10px; min-height: 1em;"></p>

        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name...">
            <button id="searchBtn">Search</button>
        </div>

        <div id="loader" class="hidden" style="margin: 15px 0; font-weight: bold; color: #fff;">
            ⌛ Fetching live data...
        </div>
        
        <div id="weatherResult" class="weather-card hidden">
            <div id="weatherIcon" style="font-size: 3rem; margin-bottom: 10px;"></div>
            
            <h2 id="cityName">---</h2>
            <div class="temp-display">
                <span id="temperature">0</span>°C
            </div>
            <p id="description">Conditions will appear here</p>
            <div class="details">
                <span>Humidity: <b id="humidity">0</b>%</span>
                <span>Wind: <b id="wind">0</b> km/h</span>
            </div>
        </div>

        <div id="forecastSection" class="hidden" style="margin-top: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>5-Day Forecast</h3>
                <button id="toggleViewBtn" style="padding: 5px 10px; font-size: 0.8rem;">Switch to Chart</button>
            </div>

            <div id="forecastList" class="forecast-container"></div>

            <div id="forecastChartContainer" class="hidden" style="height: 200px; margin-top: 15px;">
                <canvas id="weatherChart"></canvas>
            </div>
        </div>
        
        <div id="historySection" style="margin-top: 20px;">
            <h4 style="border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 5px;">Recent Searches</h4>
            <div id="historyList"></div>
        </div>
        
    </div>
    
    <script src="script.js"></script>
</body>
</html>
